<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>GE — Webnovel Vault</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Lora:wght@400;500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0d0d0d;--bg2:#141414;--bg3:#1c1c1c;--border:#2a2a2a;--gold:#c9a84c;--gold2:#e8c97a;--red:#8b2020;--text:#e8e0d0;--muted:#6a6460;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:"Lora",Georgia,serif;min-height:100vh;}
header{display:flex;align-items:center;justify-content:space-between;padding:0 40px;height:70px;border-bottom:1px solid var(--border);background:var(--bg2);position:sticky;top:0;z-index:100;}
.logo{display:flex;align-items:center;gap:12px;text-decoration:none;}
.logo-icon{width:36px;height:36px;background:var(--gold);display:flex;align-items:center;justify-content:center;font-size:1.1rem;color:var(--bg);}
.logo-text{font-family:"Playfair Display",serif;font-size:1.4rem;color:var(--gold);}
.logo-text span{color:var(--text);font-style:italic;}
.back{font-family:"JetBrains Mono",monospace;font-size:0.7rem;letter-spacing:0.12em;text-transform:uppercase;color:var(--muted);text-decoration:none;transition:color 0.2s;}
.back:hover{color:var(--gold);}
.novel-hero{display:grid;grid-template-columns:220px 1fr;gap:48px;padding:52px 40px;border-bottom:1px solid var(--border);max-width:1000px;margin:0 auto;}
.cover-img{width:100%;aspect-ratio:2/3;object-fit:cover;border:1px solid var(--border);display:block;}
.novel-meta{display:flex;flex-direction:column;justify-content:center;}
.novel-status{font-family:"JetBrains Mono",monospace;font-size:0.65rem;letter-spacing:0.18em;text-transform:uppercase;color:var(--red);margin-bottom:12px;}
.novel-title{font-family:"Playfair Display",serif;font-size:clamp(1.8rem,4vw,2.8rem);line-height:1.15;color:var(--text);margin-bottom:8px;}
.novel-author{font-size:1rem;color:var(--muted);font-style:italic;margin-bottom:20px;}
.novel-desc{font-size:1rem;line-height:1.75;color:var(--text);opacity:0.8;margin-bottom:24px;}
.novel-stats{display:flex;gap:28px;}
.nstat{display:flex;flex-direction:column;gap:2px;}
.nstat-num{font-family:"Playfair Display",serif;font-size:1.6rem;color:var(--gold);}
.nstat-label{font-family:"JetBrains Mono",monospace;font-size:0.62rem;letter-spacing:0.18em;color:var(--muted);text-transform:uppercase;}
.content{max-width:1000px;margin:0 auto;padding:48px 40px 80px;}
.section-header{display:flex;align-items:center;gap:16px;margin-bottom:28px;}
.section-title{font-family:"JetBrains Mono",monospace;font-size:0.7rem;letter-spacing:0.25em;color:var(--muted);text-transform:uppercase;white-space:nowrap;}
.section-line{flex:1;height:1px;background:var(--border);}
.add-btn{font-family:"JetBrains Mono",monospace;font-size:0.68rem;letter-spacing:0.1em;text-transform:uppercase;padding:8px 18px;background:var(--gold);color:var(--bg);border:none;cursor:pointer;transition:opacity 0.2s;white-space:nowrap;}
.add-btn:hover{opacity:0.8;}
.chapter-list{display:flex;flex-direction:column;gap:2px;}
.chapter-row{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;background:var(--bg2);border:1px solid var(--border);border-left:3px solid transparent;text-decoration:none;color:inherit;transition:all 0.2s;}
.chapter-row:hover{border-left-color:var(--gold);transform:translateX(4px);}
.ch-left{display:flex;align-items:center;gap:16px;}
.ch-num{font-family:"JetBrains Mono",monospace;font-size:0.72rem;color:var(--gold);opacity:0.7;min-width:36px;}
.ch-title{font-size:1rem;}
.ch-date{font-family:"JetBrains Mono",monospace;font-size:0.68rem;color:var(--muted);}
.empty-ch{text-align:center;padding:50px 20px;color:var(--muted);font-style:italic;}
.modal-bg{display:none;position:fixed;inset:0;z-index:500;background:rgba(0,0,0,0.88);backdrop-filter:blur(4px);align-items:center;justify-content:center;}
.modal-bg.open{display:flex;}
.modal{background:var(--bg2);border:1px solid var(--border);width:min(580px,95vw);max-height:90vh;overflow-y:auto;padding:36px;position:relative;animation:slideUp 0.25s ease;}
@keyframes slideUp{from{transform:translateY(20px);opacity:0;}to{transform:translateY(0);opacity:1;}}
.modal-close{position:absolute;top:16px;right:20px;background:none;border:none;color:var(--muted);font-size:1.3rem;cursor:pointer;}
.modal-close:hover{color:var(--text);}
.modal h2{font-family:"Playfair Display",serif;font-size:1.4rem;color:var(--gold);margin-bottom:6px;}
.modal-sub{font-size:0.85rem;color:var(--muted);font-style:italic;margin-bottom:28px;}
.field{margin-bottom:18px;}
.field label{display:block;font-family:"JetBrains Mono",monospace;font-size:0.68rem;letter-spacing:0.18em;color:var(--gold);text-transform:uppercase;margin-bottom:7px;}
.field input,.field textarea{width:100%;background:var(--bg3);border:1px solid var(--border);color:var(--text);font-family:"Lora",serif;font-size:0.95rem;padding:10px 14px;outline:none;transition:border-color 0.2s;}
.field input:focus,.field textarea:focus{border-color:var(--gold);}
.field textarea{min-height:300px;resize:vertical;line-height:1.8;}
.btn-row{display:flex;gap:10px;margin-top:24px;flex-wrap:wrap;}
.btn{font-family:"JetBrains Mono",monospace;font-size:0.72rem;letter-spacing:0.1em;text-transform:uppercase;padding:11px 22px;border:1px solid;cursor:pointer;transition:all 0.2s;}
.btn-gold{background:var(--gold);border-color:var(--gold);color:var(--bg);}
.btn-gold:hover{opacity:0.8;}
.btn-ghost{background:transparent;border-color:var(--border);color:var(--muted);}
.btn-ghost:hover{border-color:var(--gold);color:var(--text);}
.output{display:none;margin-top:28px;border-top:1px solid var(--border);padding-top:24px;}
.output h3{font-family:"JetBrains Mono",monospace;font-size:0.7rem;letter-spacing:0.2em;color:var(--gold);text-transform:uppercase;margin-bottom:16px;}
.file-block{background:var(--bg);border:1px solid var(--border);border-left:3px solid var(--gold);padding:14px 16px;margin-bottom:12px;}
.file-name{font-family:"JetBrains Mono",monospace;font-size:0.72rem;color:var(--gold2);margin-bottom:6px;}
.file-desc{font-size:0.78rem;color:var(--muted);font-style:italic;margin-bottom:10px;}
.copy-btn{font-family:"JetBrains Mono",monospace;font-size:0.65rem;letter-spacing:0.1em;padding:5px 12px;background:transparent;border:1px solid var(--border);color:var(--muted);cursor:pointer;transition:all 0.15s;text-transform:uppercase;}
.copy-btn:hover{border-color:var(--gold);color:var(--gold);}
.deploy-steps{margin-top:20px;padding:16px;border:1px dashed var(--border);font-size:0.82rem;color:var(--muted);line-height:1.8;}
.deploy-steps strong{color:var(--gold2);}
.deploy-steps code{background:var(--bg);padding:1px 6px;font-family:"JetBrains Mono",monospace;font-size:0.75rem;color:var(--text);}
@media(max-width:700px){.novel-hero{grid-template-columns:1fr;}.cover-img{max-width:180px;}.content,.novel-hero{padding:24px 16px;}header{padding:0 16px;}}
</style>
</head>
<body>
<header>
<a class="logo" href="../index.html"><div class="logo-icon">📚</div><div class="logo-text">Webnovel <span>Vault</span></div></a>
<a class="back" href="../index.html">← Library</a>
</header>
<section class="novel-hero">
<img class="cover-img" src="https://placehold.co/300x420/1c1c1c/c9a84c?text=GE" alt="GE"/>
<div class="novel-meta">
<div class="novel-status">Ongoing</div>
<h1 class="novel-title">GE</h1>
<div class="novel-author">by LC</div>
<p class="novel-desc">No description yet.</p>
<div class="novel-stats"><div class="nstat"><div class="nstat-num" id="chcount">0</div><div class="nstat-label">Chapters</div></div></div>
</div>
</section>
<div class="content">
<div class="section-header"><div class="section-title">Table of Contents</div><div class="section-line"></div><button class="add-btn" onclick="document.getElementById('chmodal').classList.add('open')">+ Add Chapter</button></div>
<div class="chapter-list" id="chlist"><div class="empty-ch">No chapters yet.</div></div>
</div>
<div class="modal-bg" id="chmodal">
<div class="modal">
<button class="modal-close" onclick="document.getElementById('chmodal').classList.remove('open');document.getElementById('choutput').style.display='none'">✕</button>
<h2>Add New Chapter</h2>
<p class="modal-sub">Paste your translated chapter text below.</p>
<div class="field"><label>Chapter Number</label><input type="number" id="chnum" min="1" placeholder="e.g. 1"/></div>
<div class="field"><label>Chapter Title</label><input type="text" id="chtitle" placeholder="e.g. The Wicked Old Man"/></div>
<div class="field"><label>Chapter Text</label><textarea id="chtext" placeholder="Paste your translated chapter here..."></textarea></div>
<div class="btn-row"><button class="btn btn-gold" onclick="genChapter()">Generate Files</button><button class="btn btn-ghost" onclick="document.getElementById('chmodal').classList.remove('open')">Cancel</button></div>
<div class="output" id="choutput"><h3>📁 Files to Add to GitHub</h3><div id="chfiles"></div><div class="deploy-steps" id="chdeploy"></div></div>
</div></div>
<script>
var NID="ge",NTITLE="GE",NAUTHOR="LC",NCOVER="https://placehold.co/300x420/1c1c1c/c9a84c?text=GE",NSTATUS="Ongoing",NDESC="No description yet.";
function pad(n){return String(n).padStart(3,"0");}
function todayStr(){return new Date().toISOString().split("T")[0];}
function copyTxt(t,b){navigator.clipboard.writeText(t).then(()=>{var o=b.textContent;b.textContent="✓ Copied!";setTimeout(()=>b.textContent=o,2000);});}
async function loadCh(){
  var data;
  try{var r=await fetch("../novels/"+NID+".json?v="+Date.now());data=await r.json();}catch(e){data={chapters:[]};}
  var chs=data.chapters||[];
  document.getElementById("chcount").textContent=chs.length;
  var list=document.getElementById("chlist");
  if(!chs.length){list.innerHTML="<div class='empty-ch'>No chapters yet — click <strong>+ Add Chapter</strong> to begin.</div>";return;}
  list.innerHTML=chs.map(function(ch){
    return "<a class='chapter-row' href='../chapters/"+NID+"/chapter-"+pad(ch.id)+".html'>"
      +"<div class='ch-left'><span class='ch-num'>"+pad(ch.id)+"</span><span class='ch-title'>"+ch.title+"</span></div>"
      +"<span class='ch-date'>"+(ch.date||"")+"</span></a>";
  }).join("");
}
async function genChapter(){
  var num=parseInt(document.getElementById("chnum").value);
  var title=document.getElementById("chtitle").value.trim();
  var text=document.getElementById("chtext").value.trim();
  if(!num||!title||!text){alert("Please fill in all fields.");return;}
  var padded=pad(num);
  var dt=todayStr();
  var paras=text.split(/\n+/).filter(function(p){return p.trim();}).map(function(p){return "<p class='para'>"+p.trim()+"</p>";}).join("\n");
  var prev=num>1?"<a href='chapter-"+pad(num-1)+".html' class='nav-btn'>← Previous</a>":"<span class='nav-btn disabled'>← Previous</span>";
  var next="<a href='chapter-"+pad(num+1)+".html' class='nav-btn'>Next →</a>";
  var chHTML=buildChHTML(num,padded,title,paras,prev,next,dt);
  var novelData;
  try{var r2=await fetch("../novels/"+NID+".json?v="+Date.now());novelData=await r2.json();}
  catch(e){novelData={id:NID,title:NTITLE,author:NAUTHOR,cover:NCOVER,status:NSTATUS,description:NDESC,chapters:[]};}
  if(!novelData.chapters.find(function(c){return c.id===num;})){
    novelData.chapters.push({id:num,title:"Chapter "+num+": "+title,date:dt});
    novelData.chapters.sort(function(a,b){return a.id-b.id;});
  }
  var libData;
  try{var r3=await fetch("../library.json?v="+Date.now());libData=await r3.json();}
  catch(e){libData={novels:[]};}
  var le=libData.novels.find(function(n){return n.id===NID;});
  if(le)le.chapters=novelData.chapters.length;
  var novelJSON=JSON.stringify(novelData,null,2);
  var libJSON=JSON.stringify(libData,null,2);
  var fd=document.getElementById("chfiles");fd.innerHTML="";
  function makeBlock(fname,fdesc,content){
    var b=document.createElement("div");b.className="file-block";
    b.innerHTML="<div class='file-name'>📄 "+fname+"</div><div class='file-desc'>"+fdesc+"</div>";
    var btn=document.createElement("button");btn.className="copy-btn";btn.textContent="Copy Content";
    btn.onclick=function(){copyTxt(content,btn);};b.appendChild(btn);fd.appendChild(b);
  }
  makeBlock("chapters/"+NID+"/chapter-"+padded+".html","New chapter page",chHTML);
  makeBlock("novels/"+NID+".json","Updated novel data — replace existing",novelJSON);
  makeBlock("library.json","Updated library — replace root file",libJSON);
  document.getElementById("chdeploy").innerHTML="<strong>How to deploy:</strong><br>1. Create <code>chapters/"+NID+"/chapter-"+padded+".html</code><br>2. Replace <code>novels/"+NID+".json</code><br>3. Replace root <code>library.json</code><br>4. Commit → live in ~30 seconds ✦";
  document.getElementById("choutput").style.display="block";
  document.getElementById("choutput").scrollIntoView({behavior:"smooth"});
}
function buildChHTML(num,padded,title,paras,prev,next,dt){
  return "<!DOCTYPE html>\n"
  +"<html lang='en'>\n<head>\n"
  +"<meta charset='UTF-8'/>\n"
  +"<meta name='viewport' content='width=device-width, initial-scale=1.0'/>\n"
  +"<title>Chapter "+num+": "+title+"</title>\n"
  +"<link rel='preconnect' href='https://fonts.googleapis.com'>\n"
  +"<link href='https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Lora:wght@400;500&family=JetBrains+Mono:wght@400;500&display=swap' rel='stylesheet'>\n"
  +"<style>\n"
  +":root{--bg:#0d0d0d;--bg2:#141414;--border:#2a2a2a;--gold:#c9a84c;--text:#e8e0d0;--muted:#6a6460;}\n"
  +"*{margin:0;padding:0;box-sizing:border-box;}\n"
  +"body{background:var(--bg);color:var(--text);font-family:'Lora',Georgia,serif;line-height:1.85;min-height:100vh;}\n"
  +"header{display:flex;align-items:center;justify-content:space-between;padding:0 40px;height:70px;border-bottom:1px solid var(--border);background:var(--bg2);position:sticky;top:0;z-index:100;}\n"
  +".logo{display:flex;align-items:center;gap:12px;text-decoration:none;}\n"
  +".logo-icon{width:36px;height:36px;background:var(--gold);display:flex;align-items:center;justify-content:center;color:var(--bg);}\n"
  +".logo-text{font-family:'Playfair Display',serif;font-size:1.3rem;color:var(--gold);}\n"
  +".logo-text span{color:var(--text);font-style:italic;}\n"
  +".back{font-family:'JetBrains Mono',monospace;font-size:0.7rem;letter-spacing:0.12em;text-transform:uppercase;color:var(--muted);text-decoration:none;transition:color 0.2s;}\n"
  +".back:hover{color:var(--gold);}\n"
  +".ch-header{text-align:center;padding:48px 20px 36px;border-bottom:1px solid var(--border);background:var(--bg2);}\n"
  +".ch-label{font-family:'JetBrains Mono',monospace;font-size:0.68rem;letter-spacing:0.25em;color:var(--muted);text-transform:uppercase;margin-bottom:10px;}\n"
  +".ch-title{font-family:'Playfair Display',serif;font-size:clamp(1.4rem,4vw,2.4rem);color:var(--text);line-height:1.2;}\n"
  +".ch-meta{margin-top:10px;font-size:0.8rem;color:var(--muted);font-style:italic;}\n"
  +"main{max-width:700px;margin:0 auto;padding:52px 24px 80px;}\n"
  +".para{margin-bottom:1.5em;font-size:1.1rem;color:var(--text);}\n"
  +".nav-bar{display:flex;justify-content:space-between;align-items:center;margin-top:64px;padding-top:28px;border-top:1px solid var(--border);}\n"
  +".nav-btn{font-family:'JetBrains Mono',monospace;font-size:0.7rem;letter-spacing:0.12em;padding:10px 20px;border:1px solid var(--border);color:var(--muted);text-decoration:none;text-transform:uppercase;transition:all 0.2s;}\n"
  +".nav-btn:hover{border-color:var(--gold);color:var(--gold);}\n"
  +".nav-btn.disabled{opacity:0.2;pointer-events:none;}\n"
  +"@media(max-width:600px){header{padding:0 16px;}main{padding:32px 16px 60px;}}\n"
  +"</style>\n</head>\n<body>\n"
  +"<header>\n"
  +"<a class='logo' href='../../index.html'><div class='logo-icon'>📚</div><div class='logo-text'>Webnovel <span>Vault</span></div></a>\n"
  +"<a class='back' href='../../novels/ge.html'>← GE</a>\n"
  +"</header>\n"
  +"<div class='ch-header'><div class='ch-label'>Chapter "+num+"</div><h1 class='ch-title'>"+title+"</h1><div class='ch-meta'>Added "+dt+"</div></div>\n"
  +"<main>\n"+paras+"\n"
  +"<nav class='nav-bar'>"+prev+"<a href='../../novels/ge.html' class='nav-btn'>☰ Contents</a>"+next+"</nav>\n"
  +"</main>\n</body>\n</html>";
}
loadCh();
</script>
</body>
</html>
